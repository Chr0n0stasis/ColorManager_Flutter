name: Mobile Flutter Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "**"
  pull_request:
    paths:
      - "**"

jobs:
  build-packages:
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Detect Flutter project directory
        id: detect_project
        shell: bash
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "project_dir=." >> "$GITHUB_OUTPUT"
          elif [ -f "mobile_flutter/pubspec.yaml" ]; then
            echo "project_dir=mobile_flutter" >> "$GITHUB_OUTPUT"
          else
            echo "Cannot find pubspec.yaml in repository root or mobile_flutter/." >&2
            exit 1
          fi

      - name: Show toolchain version
        working-directory: ${{ steps.detect_project.outputs.project_dir }}
        run: flutter --version

      - name: Create Android and iOS host projects if missing
        working-directory: ${{ steps.detect_project.outputs.project_dir }}
        shell: bash
        run: |
          if [ ! -d "android" ] || [ ! -d "ios" ]; then
            flutter create --platforms=android,ios --no-pub .
          fi

      - name: Install dependencies
        working-directory: ${{ steps.detect_project.outputs.project_dir }}
        run: flutter pub get

      - name: Run tests
        working-directory: ${{ steps.detect_project.outputs.project_dir }}
        run: flutter test

      - name: Build release APK
        working-directory: ${{ steps.detect_project.outputs.project_dir }}
        run: flutter build apk --release

      - name: Build release AAB
        working-directory: ${{ steps.detect_project.outputs.project_dir }}
        run: flutter build appbundle --release

      - name: Build unsigned iOS app
        working-directory: ${{ steps.detect_project.outputs.project_dir }}
        run: flutter build ios --release --no-codesign

      - name: Package unsigned iOS IPA
        working-directory: ${{ steps.detect_project.outputs.project_dir }}
        shell: bash
        run: |
          APP_PATH=$(find build/ios/iphoneos -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "No iOS .app bundle produced." >&2
            exit 1
          fi

          mkdir -p build/ios/unsigned/Payload
          cp -R "$APP_PATH" build/ios/unsigned/Payload/
          (
            cd build/ios/unsigned
            /usr/bin/zip -qry ../unsigned-iphoneos.ipa Payload
          )

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: color-manager-release-apk
          path: ${{ steps.detect_project.outputs.project_dir }}/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: color-manager-release-aab
          path: ${{ steps.detect_project.outputs.project_dir }}/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload unsigned iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: color-manager-ios-unsigned-ipa
          path: ${{ steps.detect_project.outputs.project_dir }}/build/ios/unsigned-iphoneos.ipa
          if-no-files-found: error
