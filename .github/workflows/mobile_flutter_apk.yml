name: Mobile Flutter Packages

on:
  workflow_dispatch:
  push:
    paths:
      - mobile_flutter/**
      - .github/workflows/mobile_flutter_apk.yml
  pull_request:
    paths:
      - mobile_flutter/**
      - .github/workflows/mobile_flutter_apk.yml

jobs:
  build-packages:
    runs-on: macos-26

    defaults:
      run:
        working-directory: mobile_flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show toolchain version
        run: flutter --version

      - name: Create Android and iOS host projects if missing
        run: |
          if [ ! -d "android" ] || [ ! -d "ios" ]; then
            flutter create --platforms=android,ios --no-pub .
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Package unsigned iOS IPA
        run: |
          APP_PATH=$(find build/ios/iphoneos -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "No iOS .app bundle produced."
            exit 1
          fi

          mkdir -p build/ios/unsigned/Payload
          cp -R "$APP_PATH" build/ios/unsigned/Payload/
          (
            cd build/ios/unsigned
            /usr/bin/zip -qry ../unsigned-iphoneos.ipa Payload
          )

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: color-manager-release-apk
          path: mobile_flutter/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: color-manager-release-aab
          path: mobile_flutter/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload unsigned iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: color-manager-ios-unsigned-ipa
          path: mobile_flutter/build/ios/unsigned-iphoneos.ipa
          if-no-files-found: error
