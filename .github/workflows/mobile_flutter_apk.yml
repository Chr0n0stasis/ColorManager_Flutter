name: Mobile Flutter Packages

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: mobile_flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show toolchain version
        run: flutter --version

      - name: Create Android host project if missing
        shell: bash
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android --no-pub .
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Apply mobile app icons
        run: flutter pub run flutter_launcher_icons -f flutter_launcher_icons_mobile.yaml

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: color-manager-release-apk
          path: mobile_flutter/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-ios:
    runs-on: macos-26

    defaults:
      run:
        working-directory: mobile_flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show toolchain version
        run: flutter --version

      - name: Create iOS host project if missing
        shell: bash
        run: |
          if [ ! -d "ios" ]; then
            flutter create --platforms=ios --no-pub .
          fi

      - name: Inject iOS camera usage description
        run: |
          PLIST_PATH="ios/Runner/Info.plist"
          if [ ! -f "$PLIST_PATH" ]; then
            echo "Info.plist not found at $PLIST_PATH"
            exit 1
          fi

          CAMERA_TEXT="Camera access is required for color sampling."
          /usr/libexec/PlistBuddy -c "Print :NSCameraUsageDescription" "$PLIST_PATH" >/dev/null 2>&1 \
            && /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription $CAMERA_TEXT" "$PLIST_PATH" \
            || /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string $CAMERA_TEXT" "$PLIST_PATH"

      - name: Install dependencies
        run: flutter pub get

      - name: Apply mobile app icons
        run: flutter pub run flutter_launcher_icons -f flutter_launcher_icons_mobile.yaml

      - name: Run tests
        run: flutter test

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Package unsigned iOS IPA
        shell: bash
        run: |
          APP_PATH=$(find build/ios/iphoneos -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "No iOS .app bundle produced."
            exit 1
          fi

          mkdir -p build/ios/unsigned/Payload
          cp -R "$APP_PATH" build/ios/unsigned/Payload/
          (
            cd build/ios/unsigned
            zip -qry ../unsigned-iphoneos.ipa Payload
          )

      - name: Upload unsigned iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: color-manager-ios-unsigned-ipa
          path: mobile_flutter/build/ios/unsigned-iphoneos.ipa
          if-no-files-found: error

  build-desktop-packages:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifactName: color-manager-windows-release
            artifactPath: mobile_flutter/build/windows/x64/runner/Release/
          - os: ubuntu-latest
            platform: linux
            artifactName: color-manager-linux-release
            artifactPath: mobile_flutter/build/linux/x64/release/bundle/
          - os: macos-26
            platform: macos
            artifactName: color-manager-macos-release
            artifactPath: mobile_flutter/build/macos/Build/Products/Release/

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: mobile_flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show toolchain version
        run: flutter --version

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Ensure desktop host project
        run: flutter create --platforms=${{ matrix.platform }} --no-pub .

      - name: Install dependencies
        run: flutter pub get

      - name: Apply desktop app icons (Windows/macOS)
        if: matrix.platform == 'windows' || matrix.platform == 'macos'
        run: flutter pub run flutter_launcher_icons -f flutter_launcher_icons_desktop.yaml

      - name: Apply Linux app icon
        if: matrix.platform == 'linux'
        run: |
          if [ ! -f "assets/icons/app_icon.png" ]; then
            echo "Missing icon source: assets/icons/app_icon.png"
            exit 1
          fi
          mkdir -p linux/runner/resources
          cp assets/icons/app_icon.png linux/runner/resources/app_icon.png

      - name: Build desktop package
        run: flutter build ${{ matrix.platform }} --release

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: ${{ matrix.artifactPath }}
          if-no-files-found: error
